<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>股票技术指标交互工具</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; max-width: 100%; overflow-x: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Noto Sans CJK SC", sans-serif; color: #17202a; background: #f4f6f9; }
    .app { display: grid; grid-template-columns: 340px minmax(0, 1fr); min-height: 100vh; }
    aside { background: #fff; border-right: 1px solid #d9dee7; padding: 16px; overflow-y: auto; max-height: 100vh; position: sticky; top: 0; }
    main { min-width: 0; padding: 18px 24px 36px; }
    h1 { margin: 0 0 8px; font-size: 22px; }
    h2 { font-size: 17px; margin: 22px 0 10px; }
    h3 { margin: 0 0 6px; font-size: 16px; }
    p { line-height: 1.62; }
    label { display: block; font-size: 12px; color: #52606d; margin: 10px 0 4px; }
    input, select, button, textarea { width: 100%; font: inherit; }
    input, select { border: 1px solid #b8c2d1; border-radius: 6px; padding: 7px 8px; background: #fff; }
    button { border: 1px solid #1f5eff; background: #1f5eff; color: #fff; border-radius: 6px; padding: 8px 10px; cursor: pointer; font-weight: 650; }
    button.secondary { color: #1f2933; background: #fff; border-color: #b8c2d1; }
    button.danger { background: #b42318; border-color: #b42318; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stack { display: grid; gap: 8px; }
    .card, .chart-card, .empty, .error-box { background: #fff; border: 1px solid #d9dee7; border-radius: 8px; padding: 14px; margin-bottom: 14px; max-width: 100%; }
    .status { font-size: 12px; border-radius: 6px; padding: 8px; background: #eef2f7; color: #334e68; white-space: pre-wrap; }
    .status.ok { background: #e6f4ea; color: #176b35; }
    .status.err, .error-box { background: #fdecea; color: #9f1c12; border-color: #f4b4ad; }
    .status.warn { background: #fff7df; color: #7a4f01; }
    .hint { font-size: 12px; color: #637381; line-height: 1.55; }
    .section-title { font-size: 12px; color: #637381; font-weight: 750; margin-top: 14px; text-transform: uppercase; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 14px; }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 999px; background: #eef2f7; font-size: 12px; color: #334e68; margin: 2px 4px 2px 0; }
    .overview-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .metric { background: #f8fafc; border: 1px solid #e5e9f0; border-radius: 6px; padding: 10px; }
    .metric .label { font-size: 12px; color: #637381; }
    .metric .value { font-size: 18px; font-weight: 750; margin-top: 2px; overflow-wrap: anywhere; }
    .chart-card { overflow: hidden; }
    .subtitle { color: #52606d; font-size: 13px; margin-bottom: 8px; }
    .chart { width: 100%; height: 430px; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px 14px; margin: 8px 0 4px; font-size: 12px; }
    .legend-item { cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 5px; }
    .legend-item.off { opacity: .35; text-decoration: line-through; }
    .legend-swatch { width: 18px; height: 3px; display: inline-block; }
    .tooltip { position: fixed; pointer-events: none; background: rgba(17,24,39,.92); color: #fff; padding: 7px 9px; border-radius: 5px; font-size: 12px; display: none; z-index: 20; max-width: 280px; }
    .marker-label { font-size: 11px; paint-order: stroke; stroke: #fff; stroke-width: 3px; }
    .axis { fill: #52606d; font-size: 11px; }
    .ref-line { stroke: #9aa5b1; stroke-dasharray: 4 4; }
    .grid-line { stroke: #eef2f7; }
    .mode-panels > div { display: none; }
    .mode-panels > div.active { display: block; }
    .inline-radio { display: flex; gap: 8px; margin: 6px 0; }
    .inline-radio label { display: inline-flex; align-items: center; gap: 5px; margin: 0; color: #17202a; }
    .inline-radio input { width: auto; }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      aside { position: static; max-height: none; }
      .overview-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
<div class="app">
  <aside>
    <h1>股票技术指标工具</h1>
    <p class="hint">支持日线 CSV 导入，也支持通过本地后端调用 MCP/数据接口获取近三年日线数据。数据校验失败会停止生成图表。</p>

    <div class="section-title">数据来源</div>
    <select id="sourceMode">
      <option value="local">本地 CSV 导入</option>
      <option value="remote">股票代码动态获取</option>
    </select>

    <div class="mode-panels">
      <div id="localPanel" class="active">
        <label>选择 CSV 文件</label>
        <input id="csvFile" type="file" accept=".csv,text/csv">
        <p class="hint">请选择日线 CSV 文件。tool 目录中已放入 `smic_a_daily_qfq.csv` 和 `smic_hk_daily_qfq.csv`，可通过文件选择器手动导入。</p>
      </div>

      <div id="remotePanel">
        <label>市场</label>
        <select id="remoteMarket">
          <option>A股</option>
          <option>港股</option>
        </select>
        <label>股票代码</label>
        <input id="remoteCode" value="688981.SH" placeholder="688981.SH 或 00981.HK">
        <label>股票中文名</label>
        <input id="remoteName" value="中芯国际" placeholder="自动补全或手动填写">
        <label>MCP/Profile</label>
        <select id="profileSelect">
          <option value="local_example">local_example</option>
        </select>
        <label>后端地址</label>
        <input id="serverBase" value="http://127.0.0.1:8765">
        <label>超时时间（秒）</label>
        <input id="timeoutSec" type="number" value="30" min="5" max="180">
        <button id="fetchRemote" style="margin-top:10px">动态获取日线数据</button>
        <p class="hint">动态获取必须启动 `stock_indicator_tool_server.py`。真实 MCP 参数在后端配置文件中设置。</p>
      </div>
    </div>

    <div class="section-title">指标参数</div>
    <label>RSI 周期，逗号分隔</label>
    <input id="rsiPeriods" value="6,14,24">
    <div class="row">
      <div><label>MACD 快线</label><input id="macdFast" type="number" value="12"></div>
      <div><label>MACD 慢线</label><input id="macdSlow" type="number" value="26"></div>
    </div>
    <label>MACD Signal</label>
    <input id="macdSignal" type="number" value="9">
    <div class="row">
      <div><label>布林周期</label><input id="bbPeriod" type="number" value="20"></div>
      <div><label>标准差倍数</label><input id="bbStd" type="number" value="2" step="0.1"></div>
    </div>
    <div class="row">
      <div><label>ATR 周期</label><input id="atrPeriod" type="number" value="14"></div>
      <div><label>ADX 周期</label><input id="adxPeriod" type="number" value="14"></div>
    </div>
    <label>BIAS 周期，逗号分隔</label>
    <input id="biasPeriods" value="6,12,24">
    <div class="row">
      <div><label>Z-score 周期</label><input id="zPeriod" type="number" value="20"></div>
      <div><label>OBV 均线周期</label><input id="obvMa" type="number" value="20"></div>
    </div>

    <div class="stack" style="margin-top:12px">
      <button id="runAnalysis">校验并生成图表</button>
      <button class="secondary" id="resetParams">重置参数</button>
    </div>
    <h2>状态</h2>
    <div id="status" class="status">等待导入数据。</div>
    <h2>校验结果</h2>
    <div id="validationBox" class="status">暂无。</div>
  </aside>

  <main>
    <section class="card">
      <h2>数据概览</h2>
      <div id="overview" class="empty">请先导入本地 CSV，或通过后端动态获取日线数据。</div>
    </section>
    <section id="warnings" class="card" style="display:none"></section>
    <section id="chartArea"></section>
  </main>
</div>
<div id="tooltip" class="tooltip"></div>

<script>
const $ = (id) => document.getElementById(id);
const tooltip = $("tooltip");
let rawRows = [];
let currentMeta = { market: "未知市场", ts_code: "", name: "未知名称", source: "" };
let chartData = [];

const builtinNames = { "688981.SH": "中芯国际", "00981.HK": "中芯国际" };
const requiredFields = ["trade_date", "open", "high", "low", "close", "vol"];
const numericFields = ["open", "high", "low", "close", "pre_close", "change", "pct_chg", "vol", "amount"];

function setStatus(text, kind="") {
  $("status").className = "status" + (kind ? " " + kind : "");
  $("status").textContent = text;
}
function setValidation(text, kind="") {
  $("validationBox").className = "status" + (kind ? " " + kind : "");
  $("validationBox").textContent = text;
}
function fail(message) {
  setStatus(message, "err");
  $("chartArea").innerHTML = `<section class="error-box"><h2>停止执行</h2><p>${escapeHtml(message)}</p></section>`;
  throw new Error(message);
}
function escapeHtml(text) {
  return String(text).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function parseList(text, fallback) {
  const values = String(text).split(",").map(x => Number(x.trim())).filter(x => Number.isFinite(x) && x > 0);
  return values.length ? values : fallback;
}
function params() {
  return {
    rsi: parseList($("rsiPeriods").value, [6,14,24]),
    macdFast: Number($("macdFast").value) || 12,
    macdSlow: Number($("macdSlow").value) || 26,
    macdSignal: Number($("macdSignal").value) || 9,
    bbPeriod: Number($("bbPeriod").value) || 20,
    bbStd: Number($("bbStd").value) || 2,
    atrPeriod: Number($("atrPeriod").value) || 14,
    adxPeriod: Number($("adxPeriod").value) || 14,
    bias: parseList($("biasPeriods").value, [6,12,24]),
    zPeriod: Number($("zPeriod").value) || 20,
    obvMa: Number($("obvMa").value) || 20
  };
}

function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i+1];
    if (ch === '"' && inQuotes && next === '"') { field += '"'; i++; }
    else if (ch === '"') inQuotes = !inQuotes;
    else if (ch === "," && !inQuotes) { row.push(field); field = ""; }
    else if ((ch === "\n" || ch === "\r") && !inQuotes) {
      if (ch === "\r" && next === "\n") i++;
      row.push(field); field = "";
      if (row.some(v => v.trim() !== "")) rows.push(row);
      row = [];
    } else field += ch;
  }
  row.push(field);
  if (row.some(v => v.trim() !== "")) rows.push(row);
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim().replace(/^\ufeff/, ""));
  return rows.slice(1).map(values => Object.fromEntries(headers.map((h, i) => [h, values[i] ?? ""])));
}

function normalizeCode(market, code) {
  code = String(code || "").trim().toUpperCase();
  if (market === "A股") {
    if (/^\d{6}$/.test(code)) throw new Error("A股仅输入 6 位数字时无法可靠判断交易所，请使用 688981.SH 或 000001.SZ 格式。");
    if (!/^\d{6}\.(SH|SZ|BJ)$/.test(code)) throw new Error("A股代码格式错误，应类似 688981.SH、600000.SH、000001.SZ。");
    return code;
  }
  if (market === "港股") {
    if (/^\d{1,5}$/.test(code)) code = code.padStart(5, "0") + ".HK";
    if (!/^\d{5}\.HK$/.test(code)) throw new Error("港股代码格式错误，应类似 00981.HK；输入 981 会补全为 00981.HK。");
    return code;
  }
  return code;
}

function normalizeRows(rows, meta) {
  if (!rows.length) throw new Error("数据为空。");
  const aliases = { date: "trade_date", datetime: "trade_date", tradedate: "trade_date", volume: "vol", turnover: "amount", value: "amount" };
  const warnings = [];
  let normalized = rows.map((raw, idx) => {
    const row = {};
    Object.entries(raw).forEach(([k,v]) => row[String(k).trim().replace(/^\ufeff/, "")] = v);
    const lookup = {};
    Object.keys(row).forEach(k => lookup[k.toLowerCase().replace(/_/g, "")] = k);
    Object.entries(aliases).forEach(([alias, target]) => {
      if (!(target in row) && lookup[alias]) row[target] = row[lookup[alias]];
    });
    const missing = requiredFields.filter(f => !(f in row));
    if (missing.length) throw new Error(`缺少核心字段：${missing.join(", ")}。`);
    const out = {
      ts_code: String(row.ts_code || meta.ts_code || "").trim().toUpperCase(),
      name: String(row.name || row.stock_name || row.security_name || meta.name || builtinNames[meta.ts_code] || "未知名称"),
      trade_date: parseDate(row.trade_date)
    };
    numericFields.forEach(f => {
      if (row[f] !== undefined && String(row[f]).trim() !== "") {
        const val = Number(row[f]);
        if (!Number.isFinite(val)) throw new Error(`第 ${idx + 1} 行字段 ${f} 不是有效数字。`);
        out[f] = val;
      }
    });
    ["open", "high", "low", "close", "vol"].forEach(f => {
      if (!Number.isFinite(out[f])) throw new Error(`第 ${idx + 1} 行缺少核心字段 ${f}。`);
    });
    return out;
  }).sort((a,b) => a.trade_date.localeCompare(b.trade_date));

  const seen = new Set();
  normalized.forEach((row, idx) => {
    if (seen.has(row.trade_date)) throw new Error(`交易日期重复：${row.trade_date}。`);
    seen.add(row.trade_date);
    if (row.high < row.low) throw new Error(`${row.trade_date} high 小于 low。`);
    if (Math.min(row.open, row.high, row.low, row.close) <= 0) throw new Error(`${row.trade_date} 存在非正价格。`);
    if (row.vol < 0) throw new Error(`${row.trade_date} 成交量为负。`);
    if ((row.amount ?? 0) < 0) throw new Error(`${row.trade_date} 成交额为负。`);
    if (!Number.isFinite(row.pre_close)) {
      row.pre_close = idx === 0 ? row.close : normalized[idx - 1].close;
      warnings.push("pre_close 缺失，已用上一交易日 close 补齐。");
    }
    if (!Number.isFinite(row.change)) row.change = row.close - row.pre_close;
    if (!Number.isFinite(row.pct_chg)) row.pct_chg = row.pre_close ? row.change / row.pre_close * 100 : 0;
    if (!Number.isFinite(row.amount)) row.amount = 0;
  });
  if (normalized.length < 60) throw new Error(`样本数量不足：仅 ${normalized.length} 行，至少需要 60 个交易日。`);
  if (new Set(normalized.map(r => r.close)).size <= 1) throw new Error("close 全部相同，无法进行有效技术分析。");
  return { rows: normalized, warnings: [...new Set(warnings)] };
}

function parseDate(value) {
  const text = String(value).trim();
  if (/^\d{8}$/.test(text)) return `${text.slice(0,4)}-${text.slice(4,6)}-${text.slice(6,8)}`;
  const d = new Date(text);
  if (Number.isNaN(d.getTime())) throw new Error(`日期无法解析：${text}`);
  return d.toISOString().slice(0,10);
}

function sma(arr, n) {
  return arr.map((_, i) => i + 1 < n ? null : mean(arr.slice(i - n + 1, i + 1)));
}
function rollingStd(arr, n) {
  return arr.map((_, i) => {
    if (i + 1 < n) return null;
    const win = arr.slice(i - n + 1, i + 1), m = mean(win);
    return Math.sqrt(win.reduce((s,v) => s + (v - m) ** 2, 0) / Math.max(win.length - 1, 1));
  });
}
function mean(arr) { return arr.reduce((s,v) => s + v, 0) / arr.length; }
function ema(arr, span) {
  const alpha = 2 / (span + 1), out = [];
  arr.forEach((v, i) => out.push(i === 0 ? v : alpha * v + (1 - alpha) * out[i - 1]));
  return out;
}
function wilder(arr, n) {
  const alpha = 1 / n, out = [];
  arr.forEach((v, i) => out.push(i + 1 < n ? null : (i + 1 === n ? mean(arr.slice(0, n)) : alpha * v + (1 - alpha) * out[i - 1])));
  return out;
}
function quantile(values, q) {
  const arr = values.filter(Number.isFinite).sort((a,b) => a-b);
  if (!arr.length) return null;
  const pos = (arr.length - 1) * q, base = Math.floor(pos), rest = pos - base;
  return arr[base + 1] !== undefined ? arr[base] + rest * (arr[base + 1] - arr[base]) : arr[base];
}

function computeIndicators(rows, p) {
  const close = rows.map(r => r.close), high = rows.map(r => r.high), low = rows.map(r => r.low), vol = rows.map(r => r.vol);
  const rsiCalcPeriods = [...new Set([...p.rsi, 14])];
  rsiCalcPeriods.forEach(n => {
    const delta = close.map((v,i) => i === 0 ? 0 : v - close[i-1]);
    const gain = delta.map(v => Math.max(v, 0)), loss = delta.map(v => Math.max(-v, 0));
    const ag = wilder(gain, n), al = wilder(loss, n);
    rows.forEach((r,i) => {
      r[`rsi_${n}`] = ag[i] === null ? null : (al[i] === 0 ? 100 : 100 - 100 / (1 + ag[i] / al[i]));
    });
  });
  const fast = ema(close, p.macdFast), slow = ema(close, p.macdSlow);
  rows.forEach((r,i) => r.macd_dif = fast[i] - slow[i]);
  const dif = rows.map(r => r.macd_dif), dea = ema(dif, p.macdSignal);
  rows.forEach((r,i) => { r.macd_dea = dea[i]; r.macd_hist = (r.macd_dif - r.macd_dea) * 2; });

  const mid = sma(close, p.bbPeriod), sd = rollingStd(close, p.bbPeriod);
  rows.forEach((r,i) => {
    r.bb_mid = mid[i]; r.bb_upper = mid[i] === null ? null : mid[i] + p.bbStd * sd[i]; r.bb_lower = mid[i] === null ? null : mid[i] - p.bbStd * sd[i];
    r.bb_width = r.bb_mid ? (r.bb_upper - r.bb_lower) / r.bb_mid * 100 : null;
    r.bb_percent_b = r.bb_upper !== null ? (r.close - r.bb_lower) / (r.bb_upper - r.bb_lower) : null;
  });
  const tr = rows.map((r,i) => Math.max(r.high - r.low, Math.abs(r.high - (rows[i-1]?.close ?? r.pre_close)), Math.abs(r.low - (rows[i-1]?.close ?? r.pre_close))));
  const atr = wilder(tr, p.atrPeriod);
  rows.forEach((r,i) => { r.tr = tr[i]; r.atr = atr[i]; r.atr_pct = atr[i] === null ? null : atr[i] / r.close * 100; });

  let obv = 0;
  rows.forEach((r,i) => { if (i > 0) obv += Math.sign(r.close - rows[i-1].close) * r.vol; r.obv = obv; });
  const obvMa = sma(rows.map(r => r.obv), p.obvMa);
  rows.forEach((r,i) => r.obv_ma = obvMa[i]);

  const upMove = rows.map((r,i) => i === 0 ? 0 : r.high - rows[i-1].high);
  const downMove = rows.map((r,i) => i === 0 ? 0 : rows[i-1].low - r.low);
  const plusDm = upMove.map((v,i) => (v > downMove[i] && v > 0) ? v : 0);
  const minusDm = downMove.map((v,i) => (v > upMove[i] && v > 0) ? v : 0);
  const plusDiBase = wilder(plusDm, p.adxPeriod), minusDiBase = wilder(minusDm, p.adxPeriod);
  rows.forEach((r,i) => {
    r.plus_di = r.atr ? 100 * plusDiBase[i] / r.atr : null;
    r.minus_di = r.atr ? 100 * minusDiBase[i] / r.atr : null;
  });
  const dx = rows.map(r => (r.plus_di !== null && r.minus_di !== null && r.plus_di + r.minus_di !== 0) ? Math.abs(r.plus_di - r.minus_di) / (r.plus_di + r.minus_di) * 100 : 0);
  const adx = wilder(dx, p.adxPeriod);
  rows.forEach((r,i) => r.adx = adx[i]);

  const biasCalcPeriods = [...new Set([...p.bias, 12])];
  biasCalcPeriods.forEach(n => {
    const ma = sma(close, n);
    rows.forEach((r,i) => r[`bias_${n}`] = ma[i] ? (r.close - ma[i]) / ma[i] * 100 : null);
  });
  const zMean = sma(close, p.zPeriod), zStd = rollingStd(close, p.zPeriod);
  rows.forEach((r,i) => r.zscore = zStd[i] ? (r.close - zMean[i]) / zStd[i] : null);
  addEvents(rows, p);
  return rows;
}

function crossUp(rows, a, b, i) { return rows[i][a] > rows[i][b] && rows[i-1]?.[a] <= rows[i-1]?.[b]; }
function crossDown(rows, a, b, i) { return rows[i][a] < rows[i][b] && rows[i-1]?.[a] >= rows[i-1]?.[b]; }
function addEvents(rows, p) {
  const atrCut = quantile(rows.map(r => r.atr_pct), .9);
  const b12 = p.bias.includes(12) ? "bias_12" : `bias_${p.bias[0]}`;
  const biasHigh = quantile(rows.map(r => r[b12]), .9), biasLow = quantile(rows.map(r => r[b12]), .1);
  rows.forEach((r,i) => {
    r.event_macd_golden = i > 0 && crossUp(rows, "macd_dif", "macd_dea", i);
    r.event_macd_death = i > 0 && crossDown(rows, "macd_dif", "macd_dea", i);
    r.event_rsi_overbought = r.rsi_14 > 70;
    r.event_rsi_oversold = r.rsi_14 < 30;
    r.event_bb_break_upper = r.bb_upper !== null && r.close > r.bb_upper;
    r.event_bb_break_lower = r.bb_lower !== null && r.close < r.bb_lower;
    r.event_atr_high = r.atr_pct !== null && r.atr_pct >= atrCut;
    r.event_adx_trend = i > 0 && r.adx > 25 && rows[i-1].adx <= 25;
    r.event_bias_high = r[b12] !== null && r[b12] >= biasHigh;
    r.event_bias_low = r[b12] !== null && r[b12] <= biasLow;
    r.event_z_high = r.zscore > 2;
    r.event_z_low = r.zscore < -2;
    const win = rows.slice(Math.max(0, i-19), i+1);
    r.event_obv_bear_div = win.length >= 20 && r.close >= Math.max(...win.map(x => x.close)) && r.obv < Math.max(...win.map(x => x.obv));
    r.event_obv_bull_div = win.length >= 20 && r.close <= Math.min(...win.map(x => x.close)) && r.obv > Math.min(...win.map(x => x.obv));
  });
}

function marker(rows, event, y, label, color, symbol) {
  const pts = rows.filter(r => r[event]);
  return { label, color, symbol, x: pts.map(r => r.trade_date), y: pts.map(r => safe(r[y])) };
}
function series(rows, field, label, color, kind="line", visible=true) {
  return { field, label, color, kind, visible, y: rows.map(r => safe(r[field])) };
}
function safe(v) { return Number.isFinite(v) ? Number(v.toFixed(5)) : null; }

function chartConfigs(rows, meta, p) {
  const x = rows.map(r => r.trade_date);
  const rsiFields = p.rsi.map((n, idx) => series(rows, `rsi_${n}`, `RSI ${n}`, ["#ff7f0e","#1f77b4","#9467bd","#17becf"][idx % 4]));
  const biasFields = p.bias.map((n, idx) => series(rows, `bias_${n}`, `BIAS ${n}`, ["#ff7f0e","#1f77b4","#9467bd","#17becf"][idx % 4]));
  return [
    { id:"bb", title:`图1 ${meta.market} ${meta.ts_code} ${meta.name} 收盘价与布林带`, subtitle:"高亮：突破上轨、跌破下轨。", x, series:[series(rows,"close","收盘价","#1f77b4"), series(rows,"bb_upper","布林上轨","#d62728"), series(rows,"bb_mid","布林中轨","#7f7f7f"), series(rows,"bb_lower","布林下轨","#2ca02c")], refs:[], markers:[marker(rows,"event_bb_break_upper","close","突破上轨","#d62728","▲"), marker(rows,"event_bb_break_lower","close","跌破下轨","#2ca02c","▼")] },
    { id:"rsi", title:`图2 ${meta.market} ${meta.ts_code} RSI`, subtitle:"高亮：RSI14 超买/超卖。", x, series:rsiFields, refs:[{value:70,label:"超买70"},{value:30,label:"超卖30"}], markers:[marker(rows,"event_rsi_overbought","rsi_14","RSI14>70","#d62728","●"), marker(rows,"event_rsi_oversold","rsi_14","RSI14<30","#2ca02c","●")] },
    { id:"macd", title:`图3 ${meta.market} ${meta.ts_code} MACD`, subtitle:"高亮：DIF 上穿 DEA 为金叉，下穿为死叉。", x, series:[series(rows,"macd_hist","MACD柱","#9aa5b1","bar"), series(rows,"macd_dif","DIF","#1f77b4"), series(rows,"macd_dea","DEA","#ff7f0e")], refs:[{value:0,label:"0轴"}], markers:[marker(rows,"event_macd_golden","macd_dif","金叉","#d62728","▲"), marker(rows,"event_macd_death","macd_dif","死叉","#2ca02c","▼")] },
    { id:"atr", title:`图4 ${meta.market} ${meta.ts_code} ATR`, subtitle:"高亮：ATR/收盘价位于历史前10%。", x, series:[series(rows,"atr_pct","ATR/收盘价(%)","#d62728"), series(rows,"atr","ATR","#1f77b4","line",false)], refs:[], markers:[marker(rows,"event_atr_high","atr_pct","高波动","#d62728","●")] },
    { id:"obv", title:`图5 ${meta.market} ${meta.ts_code} OBV`, subtitle:"高亮：量价背离线索。", x, series:[series(rows,"obv","OBV","#1f77b4"), series(rows,"obv_ma","OBV均线","#ff7f0e")], refs:[], markers:[marker(rows,"event_obv_bear_div","obv","疑似顶背离","#d62728","▼"), marker(rows,"event_obv_bull_div","obv","疑似底背离","#2ca02c","▲")] },
    { id:"adx", title:`图6 ${meta.market} ${meta.ts_code} ADX 与 DI`, subtitle:"高亮：ADX 上穿 25。", x, series:[series(rows,"adx","ADX","#111827"), series(rows,"plus_di","+DI","#d62728"), series(rows,"minus_di","-DI","#2ca02c")], refs:[{value:25,label:"趋势较强25"},{value:20,label:"震荡20"}], markers:[marker(rows,"event_adx_trend","adx","ADX上穿25","#111827","●")] },
    { id:"bias", title:`图7 ${meta.market} ${meta.ts_code} BIAS`, subtitle:"高亮：BIAS12 或首个 BIAS 参数位于历史前/后10%。", x, series:biasFields, refs:[{value:0,label:"0轴"}], markers:[marker(rows,"event_bias_high",p.bias.includes(12)?"bias_12":`bias_${p.bias[0]}`,"BIAS高位","#d62728","●"), marker(rows,"event_bias_low",p.bias.includes(12)?"bias_12":`bias_${p.bias[0]}`,"BIAS低位","#2ca02c","●")] },
    { id:"zscore", title:`图8 ${meta.market} ${meta.ts_code} Z-score`, subtitle:"高亮：Z-score 超过 +2 或低于 -2。", x, series:[series(rows,"zscore","Z-score","#1f77b4")], refs:[{value:2,label:"+2"},{value:0,label:"0"},{value:-2,label:"-2"}], markers:[marker(rows,"event_z_high","zscore","Z>2","#d62728","▲"), marker(rows,"event_z_low","zscore","Z<-2","#2ca02c","▼")] }
  ];
}

function interp(id, rows, p) {
  const last = rows[rows.length - 1];
  const count = (ev) => rows.filter(r => r[ev]).length;
  if (id === "bb") return `最新 percent_b 为 ${fmt(last.bb_percent_b)}，上下轨突破共 ${count("event_bb_break_upper") + count("event_bb_break_lower")} 次。突破是波动区间被打破的提示，需结合成交量和 ADX 判断趋势延续还是回归。`;
  if (id === "rsi") return `最新 RSI14 为 ${fmt(last.rsi_14)}，超买 ${count("event_rsi_overbought")} 天、超卖 ${count("event_rsi_oversold")} 天。RSI 更适合提示情绪温度，不宜单独作为买卖点。`;
  if (id === "macd") return `最新 DIF ${last.macd_dif > last.macd_dea ? "高于" : "低于"} DEA，金叉 ${count("event_macd_golden")} 次、死叉 ${count("event_macd_death")} 次。震荡期需用 ADX 或成交量过滤假信号。`;
  if (id === "atr") return `最新 ATR/收盘价为 ${fmt(last.atr_pct)}%。高波动阶段适合降低仓位、放宽止损或暂停过敏感的短线信号。`;
  if (id === "obv") return `疑似顶背离 ${count("event_obv_bear_div")} 次、底背离 ${count("event_obv_bull_div")} 次。OBV 重点观察量价是否同步确认。`;
  if (id === "adx") return `最新 ADX 为 ${fmt(last.adx)}，${last.plus_di > last.minus_di ? "+DI 高于 -DI，多头占优" : "-DI 高于 +DI，空头占优"}。ADX 高于 25 时更适合趋势策略。`;
  if (id === "bias") return `当前 BIAS 偏离均线状态可用于观察短期过热或超跌。高亮点表示相对自身历史分布的极端乖离。`;
  if (id === "zscore") return `最新 Z-score 为 ${fmt(last.zscore)}。超过 +/-2 表示相对 20 日均值显著偏离，可用于均值回复观察，但强趋势中可能持续极端。`;
  return "";
}
function fmt(v) { return Number.isFinite(v) ? v.toFixed(2) : "NA"; }

function renderOverview(rows, meta, warnings) {
  const last = rows[rows.length - 1];
  $("overview").innerHTML = `<div class="overview-grid">
    <div class="metric"><div class="label">股票</div><div class="value">${escapeHtml(meta.name || "未知名称")}</div></div>
    <div class="metric"><div class="label">代码/市场</div><div class="value">${escapeHtml(meta.ts_code)} ${escapeHtml(meta.market)}</div></div>
    <div class="metric"><div class="label">日期范围</div><div class="value">${rows[0].trade_date}<br>${last.trade_date}</div></div>
    <div class="metric"><div class="label">交易日/最新收盘</div><div class="value">${rows.length}<br>${fmt(last.close)}</div></div>
  </div>`;
  $("warnings").style.display = warnings.length ? "block" : "none";
  $("warnings").innerHTML = warnings.length ? `<h2>Warning</h2>${warnings.map(w => `<span class="pill">${escapeHtml(w)}</span>`).join("")}` : "";
}

function renderCharts(rows, meta, p) {
  chartData = chartConfigs(rows, meta, p);
  $("chartArea").innerHTML = chartData.map(cfg => {
    const legend = cfg.series.map(s => `<span class="legend-item${s.visible === false ? " off" : ""}" data-chart="${cfg.id}" data-field="${s.field}"><span class="legend-swatch" style="background:${s.color}"></span>${s.label}</span>`).join("");
    return `<section class="chart-card"><h3>${escapeHtml(cfg.title)}</h3><div class="subtitle">${escapeHtml(cfg.subtitle)}</div><div class="legend">${legend}</div><div class="chart" data-chart="${cfg.id}"></div><p>${escapeHtml(interp(cfg.id, rows, p))}</p></section>`;
  }).join("");
  initLegends();
  renderAll();
}

function run() {
  try {
    if (!rawRows.length) fail("尚未导入或获取数据。");
    const p = params();
    const meta = {...currentMeta};
    const normalized = normalizeRows(rawRows, meta);
    const rows = computeIndicators(normalized.rows.map(r => ({...r})), p);
    renderOverview(rows, meta, normalized.warnings);
    renderCharts(rows, meta, p);
    setStatus(`校验通过，已生成 ${rows.length} 条日线数据的指标图表。`, "ok");
    setValidation(`通过：核心字段完整，价格/成交量合理，无重复日期。${normalized.warnings.length ? "\\nWarning: " + normalized.warnings.join("; ") : ""}`, normalized.warnings.length ? "warn" : "ok");
  } catch (err) {
    setValidation(err.message, "err");
    if (!$("chartArea").innerHTML.includes("停止执行")) $("chartArea").innerHTML = `<section class="error-box"><h2>停止执行</h2><p>${escapeHtml(err.message)}</p></section>`;
    setStatus(err.message, "err");
  }
}

function renderChart(container, cfg) {
  container.innerHTML = "";
  const width = container.clientWidth || 900, height = 405;
  const m = {left: 58, right: 72, top: 18, bottom: 52};
  const left = m.left, right = width - m.right, top = m.top, bottom = height - m.bottom;
  const visible = cfg.series.filter(s => s.visible !== false);
  let vals = [];
  visible.forEach(s => vals = vals.concat(s.y.filter(Number.isFinite)));
  cfg.markers.forEach(m => vals = vals.concat(m.y.filter(Number.isFinite)));
  (cfg.refs || []).forEach(r => vals.push(r.value));
  if (!vals.length) return;
  let minY = Math.min(...vals), maxY = Math.max(...vals), pad = (maxY - minY || 1) * .08;
  minY -= pad; maxY += pad;
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("width", width); svg.setAttribute("height", height); svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
  const yScale = v => bottom - (v - minY) / (maxY - minY || 1) * (bottom - top);
  const xScale = i => left + i / Math.max(cfg.x.length - 1, 1) * (right - left);
  for (let k=0;k<5;k++) {
    const t = minY + (maxY-minY) * k / 4, y = yScale(t);
    svg.insertAdjacentHTML("beforeend", `<line class="grid-line" x1="${left}" x2="${right}" y1="${y}" y2="${y}"></line><text x="8" y="${y+4}" class="axis">${t.toFixed(2)}</text>`);
  }
  [0, Math.floor(cfg.x.length/4), Math.floor(cfg.x.length/2), Math.floor(cfg.x.length*3/4), cfg.x.length-1].forEach(i => {
    const x = xScale(i), anchor = i === 0 ? "start" : (i === cfg.x.length - 1 ? "end" : "middle"), labelX = i === 0 ? x+2 : (i === cfg.x.length - 1 ? x-2 : x);
    svg.insertAdjacentHTML("beforeend", `<line class="grid-line" y1="${top}" y2="${bottom}" x1="${x}" x2="${x}"></line><text x="${labelX}" y="${height-20}" text-anchor="${anchor}" class="axis">${cfg.x[i]}</text>`);
  });
  (cfg.refs || []).forEach(r => {
    const y = yScale(r.value);
    svg.insertAdjacentHTML("beforeend", `<line class="ref-line" x1="${left}" x2="${right}" y1="${y}" y2="${y}"></line><text x="${right-70}" y="${y-4}" class="axis">${r.label}</text>`);
  });
  const linePath = ys => ys.reduce((d,v,i) => {
    if (!Number.isFinite(v)) return d + " ";
    const p = `${xScale(i).toFixed(2)},${yScale(v).toFixed(2)}`;
    const prevFinite = i > 0 && Number.isFinite(ys[i-1]);
    return d + (prevFinite ? "L" : "M") + p;
  }, "");
  visible.forEach(s => {
    if (s.kind === "bar") {
      const zero = yScale(0), bw = Math.max(2, (right-left) / cfg.x.length * .62);
      s.y.forEach((v,i) => {
        if (!Number.isFinite(v)) return;
        const x = xScale(i) - bw/2, y = yScale(v), h = Math.abs(zero-y), yy = Math.min(y, zero), color = v >= 0 ? "#d66b6b" : "#4aa879";
        svg.insertAdjacentHTML("beforeend", `<rect x="${x}" y="${yy}" width="${bw}" height="${Math.max(h,1)}" fill="${color}" opacity="0.55"></rect>`);
      });
    } else {
      svg.insertAdjacentHTML("beforeend", `<path d="${linePath(s.y)}" fill="none" stroke="${s.color}" stroke-width="2"></path>`);
    }
  });
  cfg.markers.forEach(mk => {
    mk.x.forEach((date,j) => {
      const i = cfg.x.indexOf(date), v = mk.y[j];
      if (i < 0 || !Number.isFinite(v)) return;
      const node = document.createElementNS("http://www.w3.org/2000/svg", "text");
      node.setAttribute("x", xScale(i)); node.setAttribute("y", yScale(v)-7); node.setAttribute("text-anchor", "middle"); node.setAttribute("fill", mk.color); node.setAttribute("class", "marker-label"); node.textContent = mk.symbol;
      node.addEventListener("mousemove", ev => showTip(ev, `${mk.label}<br>${date}<br>${Number(v).toFixed(3)}`)); node.addEventListener("mouseleave", hideTip);
      svg.appendChild(node);
    });
  });
  const overlay = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  overlay.setAttribute("x", left); overlay.setAttribute("y", top); overlay.setAttribute("width", right-left); overlay.setAttribute("height", bottom-top); overlay.setAttribute("fill", "transparent");
  overlay.addEventListener("mousemove", ev => {
    const pt = svg.createSVGPoint(); pt.x = ev.clientX; pt.y = ev.clientY;
    const loc = pt.matrixTransform(svg.getScreenCTM().inverse());
    const idx = Math.round((loc.x - left) / (right-left) * (cfg.x.length-1));
    if (idx < 0 || idx >= cfg.x.length) return;
    const lines = [`<b>${cfg.x[idx]}</b>`];
    visible.forEach(s => { const v = s.y[idx]; if (Number.isFinite(v)) lines.push(`${s.label}: ${Number(v).toFixed(3)}`); });
    showTip(ev, lines.join("<br>"));
  });
  overlay.addEventListener("mouseleave", hideTip);
  svg.appendChild(overlay);
  container.appendChild(svg);
}

function showTip(ev, html) { tooltip.innerHTML = html; tooltip.style.left = `${ev.clientX + 12}px`; tooltip.style.top = `${ev.clientY + 12}px`; tooltip.style.display = "block"; }
function hideTip() { tooltip.style.display = "none"; }
function renderAll() { document.querySelectorAll(".chart").forEach(el => renderChart(el, chartData.find(c => c.id === el.dataset.chart))); }
function initLegends() {
  document.querySelectorAll(".legend-item").forEach(item => item.addEventListener("click", () => {
    const cfg = chartData.find(c => c.id === item.dataset.chart);
    const s = cfg.series.find(x => x.field === item.dataset.field);
    s.visible = s.visible === false ? true : false;
    item.classList.toggle("off", s.visible === false);
    renderAll();
  }));
}

$("sourceMode").addEventListener("change", () => {
  $("localPanel").classList.toggle("active", $("sourceMode").value === "local");
  $("remotePanel").classList.toggle("active", $("sourceMode").value === "remote");
});
$("csvFile").addEventListener("change", async (ev) => {
  const file = ev.target.files[0];
  if (!file) return;
  const text = await file.text();
  rawRows = parseCSV(text);
  currentMeta = { market: "本地CSV", ts_code: "", name: file.name.replace(/\.csv$/i, ""), source: "local_file" };
  setStatus(`已读取本地文件：${file.name}，${rawRows.length} 行。点击“校验并生成图表”。`);
});
async function fetchFromServer(market, code, profile="local_example") {
  const base = $("serverBase").value.replace(/\/$/, "");
  const resp = await fetch(`${base}/fetch_daily`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ market, ts_code: code, profile, timeout: Number($("timeoutSec").value) || 30 })
  });
  const data = await resp.json();
  if (!data.ok) throw new Error(`${data.error_code || "ERROR"}: ${data.message || "动态获取失败"}`);
  rawRows = data.rows;
  currentMeta = { market: data.market, ts_code: data.ts_code, name: data.name || builtinNames[data.ts_code] || "未知名称", source: data.source };
  setStatus(`已获取 ${currentMeta.market} ${currentMeta.ts_code} ${currentMeta.name}，${rawRows.length} 行。`, "ok");
  run();
}
$("fetchRemote").addEventListener("click", () => {
  try {
    const market = $("remoteMarket").value, code = normalizeCode(market, $("remoteCode").value);
    $("remoteCode").value = code;
    $("remoteName").value = $("remoteName").value || builtinNames[code] || "";
    fetchFromServer(market, code, $("profileSelect").value).catch(e => { setStatus(e.message, "err"); setValidation(e.message, "err"); });
  } catch(e) { setStatus(e.message, "err"); setValidation(e.message, "err"); }
});
$("runAnalysis").addEventListener("click", run);
$("resetParams").addEventListener("click", () => {
  $("rsiPeriods").value = "6,14,24"; $("macdFast").value = 12; $("macdSlow").value = 26; $("macdSignal").value = 9; $("bbPeriod").value = 20; $("bbStd").value = 2; $("atrPeriod").value = 14; $("adxPeriod").value = 14; $("biasPeriods").value = "6,12,24"; $("zPeriod").value = 20; $("obvMa").value = 20;
  if (rawRows.length) run();
});
async function loadProfiles() {
  try {
    const base = $("serverBase").value.replace(/\/$/, "");
    const resp = await fetch(`${base}/config`);
    const data = await resp.json();
    if (!data.ok) return;
    $("profileSelect").innerHTML = Object.entries(data.profiles).map(([key,p]) => `<option value="${key}">${escapeHtml(p.label || key)} (${escapeHtml(key)})</option>`).join("");
  } catch (_) {}
}
window.addEventListener("resize", renderAll);
loadProfiles();
</script>
